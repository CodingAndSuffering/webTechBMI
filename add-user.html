<!DOCTYPE html>
<html>
<head>
  <title>Add User</title>

  <link rel="stylesheet" href="index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container mt-5">
  <h2>Add User</h2>

  <form id="addUserForm">
    <input class="form-control mb-2" id="inputName" placeholder="Name">
    <input class="form-control mb-2" id="inputAge" type="number" placeholder="Age">
    <input class="form-control mb-2" id="inputHeight" type="number" placeholder="Height (cm)">
    <input class="form-control mb-2" id="inputWeight" type="number" placeholder="Weight (kg)">

    <select class="form-control mb-2" id="inputGender">
      <option value="">Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <select class="form-control mb-3" id="inputActivity">
      <option value="">Activity</option>
      <option value="low">Low</option>
      <option value="moderate">Moderate</option>
      <option value="high">High</option>
    </select>

    <button class="btn btn-success">Save</button>
  </form>
</div>

<script src="add-user.js"></script>
</body>
</html>
