<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Tracker</title>

  <link rel="stylesheet" href="index.css">

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="app-container container mt-4">
  <h1 class="app-title text-center">Health Tracker</h1>

  <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search users...">

  <div class="text-end mb-3">
    <a href="add-user.html" class="btn btn-primary">Add User</a>
  </div>

  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <!-- ✅ NEW IMAGE COLUMN ADDED -->
        <th>Image</th>
        <th>Name</th>
        <th>Age</th>
        <th>Height</th>
        <th>Weight</th>
        <th>BMI</th>
        <th>Status</th>
        <th>Calories</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="userTableBody"></tbody>
  </table>
</div>

<script src="index.js"></script>
</body>
</html>
