<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container mt-4">
  <h2 class="mb-3">Edit User</h2>

  <form id="editForm">
    <div class="mb-2">
      <label>Name</label>
      <input type="text" id="name" class="form-control" required>
    </div>

    <div class="mb-2">
      <label>Age</label>
      <input type="number" id="age" class="form-control" required>
    </div>

    <div class="mb-2">
      <label>Height (cm)</label>
      <input type="number" id="height" class="form-control" required>
    </div>

    <div class="mb-2">
      <label>Weight (kg)</label>
      <input type="number" id="weight" class="form-control" required>
    </div>

    <div class="mb-2">
      <label>Gender</label>
      <select id="gender" class="form-control">
        <option value="">-- Select --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Activity Level</label>
      <select id="activityLevel" class="form-control">
        <option value="">-- Select --</option>
        <option value="low">Low</option>
        <option value="moderate">Moderate</option>
        <option value="high">High</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="index.html" class="btn btn-secondary">Cancel</a>
  </form>
</div>

<script src="edit-user.js"></script>

</body>
</html>
